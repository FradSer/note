scopes:
    - name: src
      description: Core application logic, models, and CLI commands in Sources/; does not cover tests or skills
    - name: tests
      description: Unit and integration tests for core modules in Tests/; does not cover implementation code
    - name: skills
      description: Domain-specific note extensions and Cloudflare worker implementations in skills/; does not cover core application logic
    - name: worker
      description: Standalone background sync API and database migrations in worker/; does not cover the main Swift application
